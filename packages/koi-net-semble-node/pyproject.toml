[project]
name = "koi-net-semble-node"
version = "0.1.0"
description = "KOI-net node for publishing research artifacts to Semble"
readme = "README.md"
authors = [
    { name = "lukvmil", email = "millerluke1364@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "koi-net>=2.1.0b5",
    "rid-lib>=3.3.0b1",
    "koi-net-graph-extension",
    "mira-extras"
]

[build-system]
requires = ["uv_build>=0.8.15,<0.9.0"]
build-backend = "uv_build"

[tool.uv.sources]
mira-extras = { workspace = true }
koi-net-graph-extension = { git = "https://github.com/DynamicalSystemsGroup/koi-net-graph-extension" }

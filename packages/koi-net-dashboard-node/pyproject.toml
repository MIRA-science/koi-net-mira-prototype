[project]
name = "koi-net-dashboard-node"
version = "0.1.0"
description = "KOI-net node serving queryable SPARQL endpoint for dashboard front end"
readme = "README.md"
authors = [
    { name = "lukvmil", email = "millerluke1364@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "koi-net>=2.1.0b5",
    "koi-net-graph-extension>=0.1.2",
    "rid-lib>=3.3.0b1",
]

[build-system]
requires = ["uv_build>=0.8.15,<0.9.0"]
build-backend = "uv_build"

[project]
name = "mira-extras"
version = "0.1.0"
description = "Extra packages for MIRA KOI-net nodes, includes Discourse Graphs and Semble API clients."
readme = "README.md"
authors = [
    { name = "lukvmil", email = "millerluke1364@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28.1",
    "supabase>=2.29.0",
]

[build-system]
requires = ["uv_build>=0.8.15,<0.9.0"]
build-backend = "uv_build"
